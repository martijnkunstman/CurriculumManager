<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Manager Dashboard</title>
    <!-- Modern Typeface -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <!-- Ionicons for some nice icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <ion-icon name="layers-outline"></ion-icon>
                <h2>KaManager</h2>
            </div>
            <nav class="nav-links">
                <a href="#" class="nav-link active" data-target="ka_schooljaren">
                    <ion-icon name="calendar-outline"></ion-icon> School Years
                </a>
                <a href="#" class="nav-link" data-target="ka_periodes">
                    <ion-icon name="time-outline"></ion-icon> Periods
                </a>
                <a href="#" class="nav-link" data-target="ka_week_types">
                    <ion-icon name="list-circle-outline"></ion-icon> Week Types
                </a>
                <a href="#" class="nav-link" data-target="ka_weken">
                    <ion-icon name="grid-outline"></ion-icon> Weeks
                </a>
                <a href="#" class="nav-link" data-target="year_visualizer">
                    <ion-icon name="map-outline"></ion-icon> Year Visualizer
                </a>
                <a href="#" class="nav-link" data-target="cohorten">
                    <ion-icon name="people-outline"></ion-icon> Cohorten
                </a>
                <a href="#" class="nav-link" data-target="leereenheid_types">
                    <ion-icon name="pricetag-outline"></ion-icon> Leereenheid Types
                </a>
                <a href="#" class="nav-link" data-target="leereenheden">
                    <ion-icon name="book-outline"></ion-icon> Leereenheden
                </a>
                <a href="#" class="nav-link" data-target="cohort_schooljaren">
                    <ion-icon name="list-circle-outline"></ion-icon> Cohort Years
                </a>
                <a href="#" class="nav-link" data-target="cohort_planning">
                    <ion-icon name="calendar-number-outline"></ion-icon> Cohort Planning
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div style="display:flex; align-items:center; gap: 1rem;">
                    <h1 id="page-title">Manage School Years</h1>
                    <select id="year-select" class="form-control" style="display:none; width:200px;"></select>
                </div>
                <button class="btn-primary" id="btn-add-new">
                    <ion-icon name="add-outline"></ion-icon> Add New
                </button>
            </header>

            <section class="content-body">
                <div class="table-container fade-in" id="table-container">
                    <table id="data-table">
                        <thead>
                            <tr id="table-head">
                                <!-- Dynamic Headers -->
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Dynamic Rows -->
                        </tbody>
                    </table>
                </div>

                <!-- Visualization Container -->
                <div class="visualizer-container fade-in" id="visualizer-container" style="display: none;">
                    <!-- Blocks injected dynamically via JS -->
                </div>

                <!-- Cohort Years Container -->
                <div class="connections-container fade-in" id="cohort-years-container" style="display: none;">
                    <div style="margin-bottom: 20px;">
                        <label for="cohort-year-select" style="font-weight: 500;">Select Cohort:</label>
                        <select id="cohort-year-select" class="form-control" style="width: 300px; display: inline-block; margin-left: 10px;">
                            <option value="">-- Select a Cohort --</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <select id="add-schooljaar-select" class="form-control" style="width: 250px;">
                            <option value="">-- Select School Year to Add --</option>
                        </select>
                        <button class="btn-primary" id="btn-add-cohort-year">Add Year</button>
                    </div>
                    <ul id="cohort-years-list" style="list-style: none; padding: 0;"></ul>
                </div>

                <!-- Cohort Planning Container -->
                <div class="planning-container fade-in" id="cohort-planning-container" style="display:none;">
                    <div class="planning-toolbar">
                        <label style="font-weight:500;">Cohort:</label>
                        <select id="planning-cohort-select" class="form-control" style="width:220px;"></select>
                        <button class="btn-secondary" id="btn-export-sql" style="display:none;">
                            <ion-icon name="download-outline"></ion-icon> Export SQL
                        </button>
                    </div>
                    <div class="planning-workspace">
                        <div id="planning-calendar" class="planning-calendar-area"></div>
                        <aside class="planning-palette" id="planning-palette" style="display:none;">
                            <h4 class="palette-title">Leereenheden</h4>
                            <p class="palette-hint">Sleep naar de tijdlijn</p>
                            <div id="palette-list"></div>
                        </aside>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Modal / Add New Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Edit Record</h3>
                <button class="btn-close" id="btn-close-modal">
                    <ion-icon name="close-outline"></ion-icon>
                </button>
            </div>
            <div class="modal-body">
                <form id="record-form">
                    <!-- Dynamic form inputs injected here -->
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="btn-cancel">Cancel</button>
                <button class="btn-primary" id="btn-save">Save Changes</button>
            </div>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
